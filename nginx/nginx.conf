# =============================================================================
#  Nginx reverse-proxy in front of Nextcloud.
#  - Terminates plain HTTP on :80 (TLS is intentionally out of scope; the spec
#    only demands a reachable dashboard domain).
#  - Forwards every request to the Nextcloud container on its internal
#    Docker network.
#  - Writes a JSON-formatted access log to a path that lives on the named
#    HNG-nginx-logs volume so the detector and Nextcloud can read it RO.
#  - Trusts X-Forwarded-For and forwards it on, per the Stage 3 brief.
# =============================================================================

# Run a single worker process per CPU core, no daemonisation (we're in a
# container, the foreground process is the lifecycle).
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # MIME-type bookkeeping.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- realip module ------------------------------------------------------
    # Trust X-Forwarded-For when it arrives from any RFC1918 / Docker CIDR.
    # In our deployment Nginx is the public entry point so clients reach us
    # directly, and $remote_addr is the real client IP. We still configure
    # set_real_ip_from + real_ip_header so that if a future load balancer
    # is placed in front, the JSON log captures the originating client IP
    # without any further code change.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # ---- JSON access-log format --------------------------------------------
    # The detector parses one JSON object per line; using `escape=json` lets
    # nginx emit valid JSON even when fields contain quotes or backslashes.
    # Fields chosen to match the Stage 3 spec: source_ip, timestamp, method,
    # path, status, response_size. We additionally log user_agent and
    # request_time because they are cheap and useful for forensic review.
    log_format hng_json escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    # Path lives inside the HNG-nginx-logs named volume so the detector
    # (mounted RO) can tail it.
    access_log /var/log/nginx/hng-access.log hng_json;
    error_log  /var/log/nginx/hng-error.log warn;

    # ---- Performance / hygiene ---------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Nextcloud handles file uploads up to a multi-GB ceiling; raise the
    # default 1MB body limit so the proxy is not the bottleneck.
    client_max_body_size 1024M;
    proxy_request_buffering off;

    # ---- Upstreams ---------------------------------------------------------
    # Nextcloud lives in the compose backend network, reachable by name.
    upstream nextcloud_upstream {
        server nextcloud:80;
    }

    # The detector daemon runs in host network namespace (so it can mutate
    # iptables) and listens on :8080 of the host. We reach it from inside
    # this nginx container via the host-gateway alias compose injects.
    upstream dashboard_upstream {
        server host.docker.internal:8080;
    }

    # =========================================================================
    #  Server block 1 - Nextcloud, served on the EC2 IP only.
    #  default_server matches anything that isn't the dashboard hostname.
    # =========================================================================
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        location / {
            proxy_pass         http://nextcloud_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }
    }

    # =========================================================================
    #  Server block 2 - the live metrics dashboard.
    #  Served on the DuckDNS subdomain and (for convenience) on a hard-coded
    #  host-only path. Host-header routing keeps Nextcloud and the dashboard
    #  on the same port 80 listener without colliding.
    # =========================================================================
    server {
        listen      80;
        listen      [::]:80;
        server_name cloud-ng-anomaly.duckdns.org;

        location / {
            proxy_pass         http://dashboard_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The dashboard returns very small payloads; tighter timeouts
            # are a small DoS hardening.
            proxy_connect_timeout 5s;
            proxy_send_timeout    15s;
            proxy_read_timeout    15s;
        }
    }
}

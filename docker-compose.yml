# =============================================================================
#  Stage 3 Nextcloud + anomaly-detector stack.
#
#  Services:
#    db        - MariaDB persistent backing store for Nextcloud.
#    nextcloud - The pre-built kefaslungu/hng-nextcloud image, untouched
#                per the Stage 3 brief. Speaks only to the internal docker
#                network; never exposed directly to the public.
#    nginx     - Reverse proxy on :80 in front of Nextcloud. Writes JSON
#                access logs into the HNG-nginx-logs named volume.
#    detector  - Custom Python daemon (this repo). Mounts HNG-nginx-logs
#                read-only to tail logs, runs in host network namespace
#                with NET_ADMIN so it can manipulate iptables, exposes the
#                live metrics dashboard on :8080.
#
#  Named volumes:
#    HNG-nginx-logs - shared between nginx (rw) and nextcloud + detector (ro),
#                     using the EXACT name required by the spec.
#    nc_db_data     - MariaDB on-disk state.
#    nc_app_data    - Nextcloud `apps/` and other persistent app state.
#    nc_user_data   - Nextcloud user files.
# =============================================================================

services:

  db:
    image: mariadb:10.11
    container_name: hng-db
    restart: unless-stopped
    # 4-byte UTF-8 + binary collation, recommended by Nextcloud.
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nc_db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      # Trust the Nginx proxy and the EC2 public hostname so Nextcloud
      # accepts requests forwarded through it.
      NEXTCLOUD_TRUSTED_DOMAINS: "${EC2_PUBLIC_IP} localhost ${DUCKDNS_DOMAIN}"
      TRUSTED_PROXIES: "172.16.0.0/12 10.0.0.0/8 192.168.0.0/16"
      OVERWRITEPROTOCOL: http
      OVERWRITEHOST: "${EC2_PUBLIC_IP}"
    volumes:
      - nc_app_data:/var/www/html
      - nc_user_data:/var/www/html/data
      # Mount the shared logs read-only, exactly as required by the spec.
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: hng-nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      # Public HTTP listener. AWS security group + UFW already restrict
      # external exposure to ports 22/80/443 only.
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Nginx writes here; this is the named volume the spec mandates.
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - backend
    # Lets the dashboard server-block proxy to the detector daemon, which
    # listens on :8080 of the host (host network namespace) so it can
    # manipulate iptables.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/status || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    image: hng-detector:latest
    container_name: hng-detector
    restart: unless-stopped
    depends_on:
      - nginx
    # Run in the host network namespace so iptables rules added by the
    # daemon affect public traffic on the host. NET_ADMIN cap allows
    # /sbin/iptables to mutate the filter table from inside the container.
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      DETECTOR_CONFIG: /app/config.yaml
      PUBLIC_HOST: ${DUCKDNS_DOMAIN}
    volumes:
      # Read-only access to the live access log.
      - HNG-nginx-logs:/var/log/nginx:ro
      # Persist ban state and audit log on the host so they survive
      # container restarts.
      - /var/lib/hng-detector:/var/lib/hng-detector
      - /var/log/hng-detector:/var/log/hng-detector
      # iptables in the container talks to xtables_lock and netfilter,
      # which require the host's netfilter modules already loaded.
      # No extra mounts needed when network_mode: host is set.

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nc_db_data:
  nc_app_data:
  nc_user_data:

networks:
  backend:
    driver: bridge
